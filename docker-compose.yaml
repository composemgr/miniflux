# nginx proxy address - http://172.17.0.1:8086

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  miniflux:
    image: miniflux/miniflux:latest
    container_name: miniflux-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - miniflux
    ports:
      - "8086:8086"
    environment:
      TZ: ${TZ:-America/New_York}
      DATABASE_URL: postgresql://${DB_USER_NAME:-miniflux}:${DB_USER_PASS:-changeme_db_password}@miniflux-db:5432/${DB_CREATE_DATABASE_NAME:-miniflux}
    volumes:
      - ./rootfs/data/miniflux:/var/www/data
      - ./rootfs/config/miniflux:/config
    depends_on:
      - miniflux-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086"]
      interval: 30s
      timeout: 10s
      retries: 3

  miniflux-db:
    image: postgres:16-alpine
    container_name: miniflux-db
    restart: unless-stopped
    logging: *default-logging
    networks:
      - miniflux
    environment:
      TZ: ${TZ:-America/New_York}
      POSTGRES_DB: ${DB_CREATE_DATABASE_NAME:-miniflux}
      POSTGRES_USER: ${DB_USER_NAME:-miniflux}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
    volumes:
      - ./rootfs/data/db/postgres/miniflux:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  miniflux:
    external: false
