# nginx proxy address - http://172.17.0.1:8086

name: miniflux
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  app:
    image: miniflux/miniflux:latest
    pull_policy: always
    container_name: miniflux-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    logging: *default-logging
    networks:
      - miniflux
      - proxy
      - cloudflare
    ports:
      - "172.17.0.1:8086:8080"
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: miniflux-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
      DATABASE_URL: postgresql://${DB_USER_NAME:-miniflux}:${DB_USER_PASS:-changeme_db_password}@miniflux-db:5432/${DB_CREATE_DATABASE_NAME:-miniflux}?sslmode=disable
      RUN_MIGRATIONS: 1
      CREATE_ADMIN: 1
      ADMIN_USERNAME: ${APP_ADMIN_USER:-administrator}
      ADMIN_PASSWORD: ${APP_ADMIN_PASS:-changeme_admin_password}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/miniflux", "-healthcheck", "auto"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://miniflux-app:8080'
      - 'cloudflare.hostname=miniflux.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.miniflux-app.entrypoints=http'
      - 'traefik.http.routers.miniflux-app-secure.tls=true'
      - 'traefik.http.routers.miniflux-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.miniflux-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.miniflux-app.middlewares=miniflux-app-https-redirect'
      - 'traefik.http.routers.miniflux-app-secure.entrypoints=https'
      - 'traefik.http.routers.miniflux-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.miniflux-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.miniflux-app-secure.service=miniflux-app'
      - 'traefik.http.services.miniflux-app.loadbalancer.server.port=8080'

  db:
    image: postgres:latest
    pull_policy: always
    container_name: miniflux-db
    hostname: miniflux-db
    restart: always
    logging: *default-logging
    networks:
      - miniflux
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: miniflux-db
      POSTGRES_DB: ${DB_CREATE_DATABASE_NAME:-miniflux}
      POSTGRES_USER: ${DB_USER_NAME:-miniflux}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
    volumes:
      - ./volumes/data/db/postgres/miniflux:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  miniflux:
    name: miniflux
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
